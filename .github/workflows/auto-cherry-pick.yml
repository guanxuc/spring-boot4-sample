# Workflow: Auto Cherry-Pick
# Description: Automatically cherry-picks merged PRs to target branches based on labels
# Trigger: When a PR is merged with a label matching pattern "Auto-cherry-pick-to-XXX"
# Action: Cherry-picks the PR commits to the specified target branch XXX
# Support two ways to auto cherry-pick:
# 1. Add label "Auto-cherry-pick-to-XXX" to the PR, then merge PR
# 2. Merge PR, then add label "Auto-cherry-pick-to-XXX" to the merged PR

name: Auto Cherry-Pick

on:
  pull_request_target:
    types:
      - closed
      - labeled

jobs:
  backport:
    name: Auto Cherry-Pick
    runs-on: ubuntu-latest
    if: >
      github.event.pull_request.merged == true &&
      (
        github.event.action == 'closed' || 
        (github.event.action == 'labeled' && startsWith(github.event.label.name, 'Auto-cherry-pick-to-'))
      )

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Set up Git
        env:
          BOT_NAME: 'auto-cherry-pick.bot'
          BOT_EMAIL: 'noreply@github.com'
        run: |
          git config --global user.name '${{ env.BOT_NAME }}'
          git config --global user.email '${{ env.BOT_EMAIL }}'    

      - name: Cherry-pick to branches
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          ORIGINAL_SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_BRANCH: ${{ github.event.pull_request.base.ref }}
          LABEL_PREFIX: 'Auto-cherry-pick-to-'
        run: |
          # Get all labels to JSON string
          labels='${{ toJSON(github.event.pull_request.labels) }}'
          
          # Dynamically extract labels that match the prefix, and remove the prefix to get the branch name
          target_branches=$(echo "$labels" | jq -r --arg prefix "$LABEL_PREFIX" '.[] | select(.name | startswith($prefix)) | .name | ltrimstr($prefix)')

          if [ -z "$target_branches" ]; then
            echo "ℹ️ No matching backport labels found (prefix: $LABEL_PREFIX). Exiting."
            exit 0
          fi
          
          echo "✅ Found target branches: $target_branches"
          
          for branch  in $target_branches; do
            echo "🔄 Processing branch: $branch"
          
            # Check if branch exists
            if ! git rev-parse --verify "origin/$branch" >/dev/null 2>&1; then
              echo "::warning title=Branch not found::Skipping branch '$branch' - does not exist in remote"
              continue
            fi
          
            # Skip current branch
            if [ "$branch" == "$CURRENT_BRANCH" ]; then
              echo "⏭️ Skipping current branch: $branch"
              continue
            fi
          
            # Check if PR is already merged to target branch
            if git merge-base --is-ancestor "$ORIGINAL_SHA" "origin/$branch"; then
              echo "⏭️ Skipping branch '$branch' - PR is already merged to this branch"
              continue
            fi

            git checkout -B "$branch" "origin/$branch"
          
            # Execute cherry-pick
            if git cherry-pick "$ORIGINAL_SHA" -x; then 
              echo "✅ Successfully cherry-picked $ORIGINAL_SHA to $branch"
              git commit --amend -o -m "$PR_TITLE"
              git push origin "$branch"
              echo "::notice title=Success::Cherry-picked to $branch successfully"
            else
              echo "::error title=Cherry-pick conflict::Conflict occurred on branch $branch"
              git cherry-pick --abort 2>/dev/null || true
              exit 1
            fi
          done